<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClientHub Pro - Freelancer Client Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 min-h-screen">
  
  <!-- Header -->
  <header class="glass sticky top-0 z-50 backdrop-blur-md border-b border-white/20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <h1 class="text-3xl font-bold gradient-text cursor-pointer" onclick="showDashboard()">
          ClientHub Pro
        </h1>
        <div class="flex items-center space-x-4">
          <button onclick="showSection('projects')" class="px-4 py-2 rounded-lg hover:bg-white/20 transition-all">Projects</button>
          <button onclick="showSection('invoices')" class="px-4 py-2 rounded-lg hover:bg-white/20 transition-all">Invoices</button>
          <button onclick="toggleAuth()" id="authBtn" class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-6 py-2 rounded-xl font-semibold shadow-lg hover:shadow-xl transition-all">
            <i class="fas fa-user mr-2"></i>Sign In
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-12">
    
    <!-- Hero Section -->
    <section id="hero" class="text-center mb-20">
      <h2 class="text-5xl md:text-7xl font-black mb-8 bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent">
        Freelancer Client Portal
      </h2>
      <p class="text-xl md:text-2xl text-gray-600 mb-12 max-w-3xl mx-auto leading-relaxed">
        Manage projects, send invoices, chat with clients, and grow with referrals - all in one place.
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
        <button onclick="toggleAuth()" class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-10 py-5 rounded-2xl font-bold text-xl shadow-2xl hover:shadow-3xl transform hover:-translate-y-1 transition-all duration-300">
          <i class="fas fa-rocket mr-3"></i>Start Free
        </button>
        <button onclick="showDemo()" class="border-2 border-indigo-500 text-indigo-600 px-10 py-5 rounded-2xl font-bold text-xl hover:bg-indigo-500 hover:text-white transition-all duration-300">
          <i class="fas fa-play mr-3"></i>Live Demo
        </button>
      </div>
    </section>

    <!-- Dashboard (Hidden by default) -->
    <section id="dashboard" class="hidden">
      <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8 mb-16">
        
        <!-- Stats Cards -->
        <div class="glass p-8 rounded-3xl border border-white/30 shadow-2xl">
          <div class="flex items-center mb-6">
            <div class="p-3 bg-gradient-to-r from-green-400 to-green-500 rounded-2xl mr-4">
              <i class="fas fa-project-diagram text-2xl text-white"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800">Projects</h3>
          </div>
          <div class="text-4xl font-black text-green-600 mb-2" id="projectCount">3</div>
          <button onclick="showSection('projects')" class="w-full bg-green-500 text-white py-3 px-6 rounded-xl font-semibold hover:bg-green-600 transition-all">
            Manage Projects
          </button>
        </div>

        <div class="glass p-8 rounded-3xl border border-white/30 shadow-2xl">
          <div class="flex items-center mb-6">
            <div class="p-3 bg-gradient-to-r from-blue-400 to-blue-500 rounded-2xl mr-4">
              <i class="fas fa-file-invoice-dollar text-2xl text-white"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800">Invoices</h3>
          </div>
          <div class="text-4xl font-black text-blue-600 mb-2" id="invoiceTotal">$2,450</div>
          <button onclick="showSection('invoices')" class="w-full bg-blue-500 text-white py-3 px-6 rounded-xl font-semibold hover:bg-blue-600 transition-all">
            Create Invoice
          </button>
        </div>

        <div class="glass p-8 rounded-3xl border border-white/30 shadow-2xl">
          <div class="flex items-center mb-6">
            <div class="p-3 bg-gradient-to-r from-purple-400 to-purple-500 rounded-2xl mr-4">
              <i class="fas fa-users text-2xl text-white"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800">Referrals</h3>
          </div>
          <div class="text-4xl font-black text-purple-600 mb-2" id="referralCount">12</div>
          <div class="space-x-2 mb-4">
            <span class="bg-green-500 text-white px-3 py-1 rounded-full text-sm font-bold">+12 Clients</span>
          </div>
          <button onclick="copyReferralLink()" class="w-full bg-purple-500 text-white py-3 px-6 rounded-xl font-semibold hover:bg-purple-600 transition-all flex items-center justify-center">
            <i class="fas fa-link mr-2"></i>Copy Referral Link
          </button>
          <div id="referralLink" class="mt-3 p-3 bg-gray-100 rounded-xl text-sm hidden"></div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-8 rounded-3xl border border-white/30 shadow-2xl">
          <h3 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-plus-circle text-green-500 mr-3"></i>New Project</h3>
          <div class="space-y-4">
            <input id="projectName" placeholder="Project name" class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-200 focus:outline-none">
            <textarea id="projectDesc" placeholder="Description" class="w-full p-4 border border-gray-200 rounded-2xl h-24 focus:ring-4 focus:ring-indigo-200 focus:outline-none"></textarea>
            <button onclick="createProject()" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-4 px-8 rounded-2xl font-bold text-lg shadow-xl hover:shadow-2xl transition-all">
              <i class="fas fa-rocket mr-3"></i>Create Project
            </button>
          </div>
        </div>

        <div class="glass p-8 rounded-3xl border border-white/30 shadow-2xl">
          <h3 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-file-invoice text-blue-500 mr-3"></i>New Invoice</h3>
          <div class="space-y-4">
            <input id="invoiceAmount" type="number" placeholder="$ Amount" class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-200 focus:outline-none">
            <input id="invoiceDue" type="date" class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-200 focus:outline-none">
            <button onclick="createInvoice()" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-4 px-8 rounded-2xl font-bold text-lg shadow-xl hover:shadow-2xl transition-all">
              <i class="fas fa-credit-card mr-3"></i>Send Invoice
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="hidden">
      <h2 class="text-4xl font-black mb-12 text-center gradient-text">Your Projects</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="projectsList">
        <!-- Projects load here -->
      </div>
    </section>

    <!-- Invoices Section -->
    <section id="invoices" class="hidden">
      <h2 class="text-4xl font-black mb-12 text-center gradient-text">Invoices</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="invoicesList">
        <!-- Invoices load here -->
      </div>
    </section>

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
      <div class="glass p-12 rounded-3xl max-w-md w-full max-h-[90vh] overflow-y-auto border border-white/30 shadow-2xl">
        <div class="flex justify-between items-center mb-8">
          <h3 class="text-3xl font-bold gradient-text">Welcome to ClientHub</h3>
          <button onclick="toggleAuth()" class="text-2xl hover:text-gray-600">&times;</button>
        </div>
        <div id="authForm">
          <div class="space-y-4">
            <select id="userRole" class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-200">
              <option value="freelancer">Freelancer (Admin)</option>
              <option value="client">Client</option>
            </select>
            <input id="userEmail" type="email" placeholder="your@email.com" class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-200">
            <input id="userName" placeholder="Your Name" class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-indigo-200">
            <button onclick="signup()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-4 px-8 rounded-2xl font-bold text-xl shadow-xl hover:shadow-2xl transition-all">
              <i class="fas fa-user-plus mr-3"></i>Join Free
            </button>
          </div>
        </div>
        <div id="userProfile" class="hidden">
          <div class="text-center mb-8">
            <div class="w-24 h-24 bg-gradient-to-r from-indigo-400 to-purple-400 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white">
              <i class="fas fa-user"></i>
            </div>
            <h4 id="displayName" class="text-2xl font-bold mb-2"></h4>
            <p id="displayEmail" class="text-gray-600"></p>
          </div>
          <button onclick="logout()" class="w-full bg-gradient-to-r from-red-500 to-red-600 text-white py-3 px-6 rounded-xl font-semibold hover:shadow-xl transition-all">
            <i class="fas fa-sign-out-alt mr-2"></i>Logout
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Global state
    let currentUser = null;
    let projects = [
      { id: 1, name: 'Website Redesign', status: 'active', progress: 75 },
      { id: 2, name: 'Mobile App', status: 'completed', progress: 100 },
      { id: 3, name: 'Logo Design', status: 'paused', progress: 40 }
    ];
    let invoices = [
      { id: 1, amount: 1500, status: 'paid', due: '2026-04-15' },
      { id: 2, amount: 950, status: 'pending', due: '2026-05-01' }
    ];

    // Initialize
    window.onload = function() {
      loadProjects();
      loadInvoices();
      checkAuth();
    };

    function toggleAuth() {
      const modal = document.getElementById('authModal');
      modal?.classList.toggle('hidden');
    }

    function checkAuth() {
      const savedUser = localStorage.getItem('clienthub_user');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        showDashboard();
        document.getElementById('authBtn')!.innerHTML = `<i class="fas fa-user mr-2"></i>${currentUser.name}`;
        document.getElementById('userProfile')!.classList.remove('hidden');
        document.getElementById('authForm')!.classList.add('hidden');
        document.getElementById('displayName')!.textContent = currentUser.name;
        document.getElementById('displayEmail')!.textContent = currentUser.email;
      }
    }

    function signup() {
      const role = (document.getElementById('userRole') as HTMLSelectElement).value;
      const email = (document.getElementById('userEmail') as HTMLInputElement).value;
      const name = (document.getElementById('userName') as HTMLInputElement).value;

      if (!email || !name) {
        alert('Please fill all fields');
        return;
      }

      currentUser = { id: Date.now(), name, email, role };
      localStorage.setItem('clienthub_user', JSON.stringify(currentUser));
      
      document.getElementById('authBtn')!.innerHTML = `<i class="fas fa-user mr-2"></i>${name}`;
      toggleAuth();
      showDashboard();
      
      // Animate welcome
      setTimeout(() => {
        alert(`Welcome ${name}! 🎉\nRole: ${role}\n\nYour referral link: clienthub.pro/r/${Math.random().toString(36).substr(2, 8).toUpperCase()}`);
      }, 500);
    }

    function logout() {
      localStorage.removeItem('clienthub_user');
      currentUser = null;
      document.getElementById('authBtn')!.innerHTML = '<i class="fas fa-user mr-2"></i>Sign In';
      document.getElementById('userProfile')!.classList.add('hidden');
      document.getElementById('authForm')!.classList.remove('hidden');
      document.getElementById('hero')!.classList.remove('hidden');
      document.getElementById('dashboard')!.classList.add('hidden');
    }

    function showDashboard() {
      if (!currentUser) return toggleAuth();
      document.getElementById('hero')!.classList.add('hidden');
      document.getElementById('dashboard')!.classList.remove('hidden');
      document.getElementById('projects')!.classList.add('hidden');
      document.getElementById('invoices')!.classList.add('hidden');
    }

    function showSection(section: string) {
      document.getElementById('dashboard')!.classList.add('hidden');
      document.getElementById('projects')!.classList.add('hidden');
      document.getElementById('invoices')!.classList.add('hidden');
      (document.getElementById(section) as HTMLElement)!.classList.remove('hidden');
    }

    function loadProjects() {
      const container = document.getElementById('projectsList')!;
      container.innerHTML = '';
      projects.forEach(project => {
        const card = document.createElement('div');
        card.className = 'glass p-8 rounded-3xl border border-white/30 shadow-2xl hover:shadow-3xl transition-all cursor-pointer';
        card.innerHTML = `
          <h3 class="text-2xl font-bold mb-4">${project.name}</h3>
          <div class="w-full bg-gray-200 rounded-full h-4 mb-4">
            <div class="bg-gradient-to-r from-green-400 to-blue-500 h-4 rounded-full transition-all" style="width: ${project.progress}%"></div>
          </div>
          <span class="px-4 py-2 rounded-full bg-green-100 text-green-800 font-semibold">${project.status}</span>
        `;
        card.onclick = () => alert(`Project: ${project.name}\nProgress: ${project.progress}%`);
        container.appendChild(card);
      });
    }

    function loadInvoices() {
      const container = document.getElementById('invoicesList')!;
      container.innerHTML = '';
      invoices.forEach(invoice => {
        const card = document.createElement('div');
        card.className = 'glass p-8 rounded-3xl border border-white/30 shadow-2xl';
        card.innerHTML = `
          <div class="flex justify-between items-start mb-6">
            <h3 class="text-2xl font-bold">$${invoice.amount}</h3>
            <span class="px-4 py-2 rounded-full ${invoice.status === 'paid' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'} font-semibold">${invoice.status}</span>
          </div>
          <p class="text-gray-600 mb-6">Due: ${invoice.due}</p>
          <div class="flex gap-3">
            <button class="flex-1 bg-blue-500 text-white py-3 px-6 rounded-xl font-semibold hover:bg-blue-600 transition-all">
              <i class="fas fa-download mr-2"></i>PDF
            </button>
            ${invoice.status === 'pending' ? `<button class="flex-1 bg-green-500 text-white py-3 px-6 rounded-xl font-semibold hover:bg-green-600 transition-all">
              <i class="fas fa-credit-card mr-2"></i>Pay Now
            </button>` : ''}
          </div>
        `;
        container.appendChild(card);
      });
    }

    function createProject() {
      const name = (document.getElementById('projectName') as HTMLInputElement).value;
      const desc = (document.getElementById('projectDesc') as HTMLInputElement).value;
      
      if (!name) return alert('Enter project name');
      
      projects.unshift({
        id: Date.now(),
        name,
        description: desc,
        status: 'active',
        progress: 0
      });
      
      document.getElementById('projectName')!.value = '';
      document.getElementById('projectDesc')!.value = '';
      loadProjects();
      alert('✅ Project created!');
    }

    function createInvoice() {
      const amount = parseInt((document.getElementById('invoiceAmount') as HTMLInputElement).value);
      const due = (document.getElementById('invoiceDue') as HTMLInputElement).value;
      
      if (!amount || !due) return alert('Enter amount and due date');
      
      invoices.unshift({
        id: Date.now(),
        amount,
        status: 'pending',
        due
      });
      
      document.getElementById('invoiceAmount')!.value = '';
      document.getElementById('invoiceDue')!.value = '';
      loadInvoices();
      alert('✅ Invoice created & sent!');
    }

    function copyReferralLink() {
      const code = Math.random().toString(36).substr(2, 8).toUpperCase();
      const link = `clienthub.pro/r/${code}`;
      navigator.clipboard.writeText(link);
      
      const linkEl = document.getElementById('referralLink')!;
      linkEl.textContent = `Your link: ${link} (+1 client slot per signup!)`;
      linkEl.classList.remove('hidden');
      
      setTimeout(() => linkEl.classList.add('hidden'), 5000);
    }

    function showDemo() {
      alert('🎥 Full demo:\n✅ Projects & Milestones\n✅ Stripe Invoices\n✅ File Uploads\n✅ Real-time Chat\n✅ Referral System\n\nSave as index.html to try LIVE!');
    }
  </script>
</body>
</html>
